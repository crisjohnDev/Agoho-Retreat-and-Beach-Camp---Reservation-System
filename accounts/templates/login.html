<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agoho Retreat - Reservation Management</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Inter & Playfair Display Fonts for Hospitality Elegance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --resort-bg: #0b0f17;
            --resort-panel: #121824;
            --resort-border: #222d3d;
            --resort-gold: #d4af37; /* Warm luxury gold accent */
            --resort-gold-hover: #f3cf55;
            --text-muted: #9ca3af;
            --text-main: #f9fafb;
        }

        body {
            background-color: var(--resort-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(212, 175, 55, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(18, 24, 36, 0.5) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            padding: 2rem 0;
        }

        /* Luxury Bento Card Layout */
        .login-card {
            background-color: var(--resort-panel);
            border: 1px solid var(--resort-border);
            border-radius: 16px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 440px;
            padding: 3.5rem 2.5rem;
            position: relative;
        }

        /* Subtle gold top border highlight */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--resort-gold), transparent);
            border-radius: 16px 16px 0 0;
        }

        .brand-badge {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            color: var(--resort-gold);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.35rem 0.9rem;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Hospitality Input Structure */
        .form-label {
            color: #e5e7eb;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        .input-group {
            background-color: #070a10;
            border: 1px solid var(--resort-border);
            border-radius: 8px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-group-text {
            background-color: transparent !important;
            border: none !important;
            color: #4b5563;
            padding-left: 1.1rem;
            padding-right: 0.4rem;
        }

        .form-control {
            background-color: transparent !important;
            border: none !important;
            color: var(--text-main) !important;
            padding: 0.8rem 1.1rem 0.8rem 0.25rem;
            font-size: 0.9rem;
        }

        .form-control::placeholder {
            color: #4b5563;
        }

        /* Gold visual treatment upon selection */
        .input-group:focus-within {
            border-color: var(--resort-gold);
            box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.25);
        }
        
        .input-group:focus-within .input-group-text {
            color: var(--resort-gold);
        }

        /* Elegant Luxury Button styling */
        .btn-resort {
            background-color: var(--resort-gold);
            color: #0b0f17;
            border: none;
            border-radius: 8px;
            padding: 0.85rem;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-resort:hover {
            background-color: var(--resort-gold-hover);
            color: #0b0f17;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
        }

        .btn-resort:active {
            transform: scale(0.985);
        }

        .system-footer-text {
            font-size: 0.72rem;
            color: #4b5563;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="card login-card">
        
        <!-- Header Stack -->
        <div class="mb-4 text-center">
            <div class="mb-3">
                <span class="brand-badge">
                    <i class="bi bi-calendar3"></i> Concierge Portal
                </span>
            </div>
            <h3 class="brand-title mb-2">Agoho Retreat</h3>
            <p class="brand-subtitle mb-0">Sign in to manage room availability, check-ins, and guest reservations.</p>
        </div>
        
        <!-- Interactive Interface Form -->
        <form action="" method="POST" autocomplete="off">
            {% csrf_token %}
            <!-- Clerk/Admin Email Input -->
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope-at"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <!-- Passkey Entry -->
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Action Trigger -->
            <div class="d-grid mb-2">
                <button type="submit" class="btn btn-resort d-flex align-items-center justify-content-center gap-2">
                    Sign In <i class="bi bi-arrow-right fs-6"></i>
                </button>
            </div>

            <!-- Footer Meta Protection Elements -->
            <div class="text-center mt-4 pt-3 border-top" style="border-color: #1f2937 !important;">
                <span class="system-footer-text text-uppercase">
                    <i class="bi bi-lock-fill text-warning me-1"></i> Encrypted PMS Network
                </span>
            </div>
        </form>
        
    </div>
</div>

<!-- Bootstrap Bundle Components -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
