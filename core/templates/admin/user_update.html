{% extends "admin.html" %}

{% block content %}
<!-- Header Bar -->
<header class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom" style="border-color: var(--resort-border) !important;">
    <div class="d-flex align-items-center gap-3">
        <a href="{% url 'user_management' %}" class="btn btn-sm btn-outline-light px-2" style="border-color: var(--resort-border);">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="h4 fw-bold mb-1">Modify Account Parameters</h2>
            <p class="text-muted small mb-0">Adjust roles, status parameters, and configuration configurations for <strong>{{ user.full_name }}</strong>.</p>
        </div>
    </div>
</header>

<!-- Form Element Container -->
<div class="custom-table-card p-4 mx-auto" style="max-width: 800px;">
    <!-- Context routing mapped directly to specific data entry instance target -->
    <form method="POST" action="{% url 'user_update' user.id %}" class="needs-validation" novalidate>
        {% csrf_token %}

        <h5 class="fw-bold text-gold mb-4" style="color: var(--resort-gold);">
            <i class="bi bi-sliders me-2"></i>Profile Configurations
        </h5>

        <div class="row g-3 mb-4">

            <!-- Username -->
            <div class="col-md-6">
                <label class="form-label">Username</label>
                <input
                    type="text"
                    class="form-control"
                    name="username"
                    value="{{ user.username }}"
                    required>
            </div>

            <!-- Role -->
            <div class="col-md-6">
                <label class="form-label">Role</label>
                <select class="form-select" name="role" required>

                    <option value="admin"
                        {% if user.role == "admin" %}selected{% endif %}>
                        Admin
                    </option>

                    <option value="staff"
                        {% if user.role == "staff" %}selected{% endif %}>
                        Staff
                    </option>

                </select>
            </div>

            <!-- Status -->
            <div class="col-md-6">
                <label class="form-label">Status</label>

                <select class="form-select" name="status">

                    <option value="active"
                        {% if user.status == "active" %}selected{% endif %}>
                        Active
                    </option>

                    <option value="inactive"
                        {% if user.status == "inactive" %}selected{% endif %}>
                        Inactive
                    </option>

                </select>
            </div>

        </div>


        <div class="border rounded p-3 mb-4">

            <label class="form-label">
                New Password
            </label>

            <input
                type="password"
                class="form-control"
                name="force_password"
                placeholder="Leave blank to keep current password">

        </div>

        <div class="d-flex justify-content-end gap-2">

            <a href="{% url 'user_management' %}" class="btn btn-secondary">
                Cancel
            </a>

            <button type="submit" class="btn btn-primary">
                Save Changes
            </button>

        </div>

    </form>
</div>
{% endblock %}
