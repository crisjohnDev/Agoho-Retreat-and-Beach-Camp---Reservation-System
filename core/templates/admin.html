<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agoho Retreat - Management Console</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Inter & Playfair Display Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --resort-bg: #090d16;
            --resort-panel: #111827;
            --resort-border: #1f2937;
            --resort-gold: #d4af37;
            --resort-gold-muted: rgba(212, 175, 55, 0.1);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--resort-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fixed Sidebar Architecture */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: var(--resort-panel);
            border-right: 1px solid var(--resort-border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .sidebar-brand {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--resort-border);
        }

        .brand-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .sidebar-menu {
            padding: 1.5rem 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            color: var(--resort-gold);
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.04), transparent);
            border-left-color: var(--resort-gold);
        }

        .nav-link-custom.logout-btn {
            border-left-color: transparent !important;
            margin-top: auto;
            border-top: 1px solid var(--resort-border);
            padding: 1.2rem 1.5rem;
        }
        
        .nav-link-custom.logout-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        /* Main Viewport Content Block */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2.5rem;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Premium UI Bento Component Metrics */
        .metric-card {
            background-color: var(--resort-panel);
            border: 1px solid var(--resort-border);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }

        .metric-icon-box {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background-color: var(--resort-gold-muted);
            color: var(--resort-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        /* Custom Table Interface Styling */
        .custom-table-card {
            background-color: var(--resort-panel);
            border: 1px solid var(--resort-border);
            border-radius: 12px;
            padding: 1.75rem;
            margin-top: 2rem;
        }

        .table {
            color: var(--text-main) !important;
            margin-bottom: 0;
            vertical-align: middle;
        }

        .table th {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            padding: 1rem 0.75rem;
            border-bottom: 1px solid var(--resort-border);
        }

        .table td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid rgba(31, 41, 55, 0.5);
            font-size: 0.875rem;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 30px;
            font-weight: 500;
        }

        .status-confirmed { background-color: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-pending { background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        /* Responsive Breakpoints */
        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1.5rem;
            }
            .toggle-sidebar-btn {
                display: block !important;
            }
        }

        .toggle-sidebar-btn {
            display: none;
            background: var(--resort-panel);
            border: 1px solid var(--resort-border);
            color: var(--text-main);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- Persistent Navigation Sidebar -->
    <aside class="sidebar" id="sidebarMenu">
        <div class="sidebar-brand d-flex align-items-center justify-content-between">
            <h1 class="brand-text">Agoho Retreat</h1>
            <button class="toggle-sidebar-btn btn btn-sm d-lg-none" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
        </div>
        
        <nav class="sidebar-menu d-flex flex-column justify-content-between">
            <div class="nav-links-wrapper">
                <!-- Requested Nav Segments -->
                <a href="{% url 'admin_dashboard' %}" class="nav-link-custom active">
                    <i class="bi bi-grid-1x2-fill"></i> Home
                </a>
                <a href="{% url 'user_management' %}" class="nav-link-custom">
                    <i class="bi bi-shield-lock-fill"></i> User Management
                </a>
                <a href="{% url 'customer_list' %}" class="nav-link-custom">
                    <i class="bi bi-people-fill"></i> Customer
                </a>
                <a href="{% url 'room_list' %}" class="nav-link-custom">
                    <i class="bi bi-door-closed-fill"></i> Rooms
                </a>
                <a href="#books" class="nav-link-custom">
                    <i class="bi bi-calendar-check-fill"></i> Books
                </a>
                <a href="#reports" class="nav-link-custom">
                    <i class="bi bi-graph-up-arrow"></i> Report
                </a>
            </div>

            <!-- Absolute Terminate Action Route -->
            <a href="{% url 'logout' %}" class="nav-link-custom logout-btn">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main View Panel Context Framework -->
    <main class="main-content">
        
        {% block content %}
        {% endblock %}

    </main>

    <!-- UI Responsive Drawer Controller Script Logic -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebarMenu');
            sidebar.classList.toggle('show');
        }

        // Add plain link selection visualization tracking logic
        const links = document.querySelectorAll('.nav-link-custom:not(.logout-btn)');
        links.forEach(link => {
            link.addEventListener('click', () => {
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                // On mobile devices auto close side navigation drawer upon link choice
                if(window.innerWidth < 992) {
                    toggleSidebar();
                }
            });
        });
    </script>
</body>
</html>
